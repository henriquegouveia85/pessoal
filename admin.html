<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel Admin - Maria Paula & Wilson</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Montserrat', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      color: #2c3e50;
    }
    
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 25px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2em;
      letter-spacing: 3px;
      margin-bottom: 5px;
    }
    .header p {
      font-size: 0.9em;
      opacity: 0.9;
      letter-spacing: 1px;
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 30px 20px;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: white;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      text-align: center;
      transition: transform 0.3s;
    }
    .stat-card:hover { transform: translateY(-5px); }
    .stat-icone { font-size: 2.5em; margin-bottom: 10px; }
    .stat-numero {
      font-size: 3em;
      font-weight: 700;
      color: #667eea;
      font-family: 'Playfair Display', serif;
    }
    .stat-label {
      font-size: 0.9em;
      color: #7f8c8d;
      letter-spacing: 1px;
      margin-top: 5px;
    }
    
    .controles {
      background: white;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      margin-bottom: 30px;
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      align-items: center;
      justify-content: space-between;
    }
    .controles-grupo {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      font-size: 0.95em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn-primario { background: #667eea; color: white; }
    .btn-primario:hover { background: #5568d3; transform: translateY(-2px); }
    .btn-sucesso { background: #27ae60; color: white; }
    .btn-sucesso:hover { background: #229954; transform: translateY(-2px); }
    .btn-perigo { background: #e74c3c; color: white; }
    .btn-perigo:hover { background: #c0392b; transform: translateY(-2px); }
    .btn-aviso { background: #f39c12; color: white; }
    .btn-aviso:hover { background: #d68910; transform: translateY(-2px); }
    .btn:disabled { background: #bdc3c7; cursor: not-allowed; transform: none; }
    
    .status-pausa {
      background: #f39c12;
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-weight: 600;
      display: none;
      animation: pulse 1.5s infinite;
    }
    .status-pausa.ativo { display: inline-block; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    
    .abas {
      display: flex;
      gap: 5px;
      margin-bottom: 20px;
      background: white;
      padding: 8px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }
    .aba {
      flex: 1;
      padding: 12px;
      text-align: center;
      cursor: pointer;
      border-radius: 8px;
      font-weight: 600;
      transition: all 0.3s;
      color: #7f8c8d;
    }
    .aba:hover { background: #f5f5f5; }
    .aba.ativa {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    
    .conteudo-aba { display: none; }
    .conteudo-aba.ativo { display: block; }
    
    .fotos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
    }
    .foto-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      transition: transform 0.3s;
    }
    .foto-card:hover { transform: translateY(-5px); }
    .foto-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      cursor: pointer;
      transition: transform 0.3s;
    }
    .foto-card img:hover { transform: scale(1.03); }
    .foto-info {
      padding: 15px;
    }
    .foto-nome {
      font-weight: 600;
      color: #667eea;
      margin-bottom: 5px;
    }
    .foto-data {
      font-size: 0.85em;
      color: #7f8c8d;
      margin-bottom: 10px;
    }
    .foto-mensagem {
      font-style: italic;
      color: #555;
      font-size: 0.9em;
      margin-bottom: 10px;
      padding: 8px;
      background: #f8f9fa;
      border-radius: 8px;
      border-left: 3px solid #667eea;
    }
    .btn-deletar {
      width: 100%;
      padding: 10px;
      background: #e74c3c;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.3s;
    }
    .btn-deletar:hover { background: #c0392b; }
    
    .mensagens-lista {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .mensagem-card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      border-left: 4px solid #667eea;
    }
    .mensagem-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .mensagem-nome {
      font-weight: 600;
      color: #667eea;
    }
    .mensagem-data {
      font-size: 0.85em;
      color: #7f8c8d;
    }
    .mensagem-texto {
      font-style: italic;
      color: #2c3e50;
      line-height: 1.6;
      font-size: 1.05em;
    }
    
    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #2c3e50;
      color: white;
      padding: 15px 25px;
      border-radius: 10px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s;
      z-index: 1000;
    }
    .toast.ativo {
      transform: translateY(0);
      opacity: 1;
    }
    .toast.sucesso { background: #27ae60; }
    .toast.erro { background: #e74c3c; }
    
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }
    .modal-overlay.ativo { display: flex; }
    .modal {
      background: white;
      padding: 30px;
      border-radius: 16px;
      max-width: 400px;
      text-align: center;
    }
    .modal h3 {
      font-family: 'Playfair Display', serif;
      margin-bottom: 15px;
      color: #2c3e50;
    }
    .modal p {
      margin-bottom: 20px;
      color: #7f8c8d;
    }
    .modal-botoes {
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    .lightbox-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.92);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      cursor: zoom-out;
      padding: 40px;
    }
    .lightbox-overlay.ativo { display: flex; }
    .lightbox-overlay img {
      max-width: 100%;
      max-height: 100%;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      object-fit: contain;
    }
    
    @media (max-width: 768px) {
      .header h1 { font-size: 1.5em; }
      .stat-numero { font-size: 2em; }
      .controles { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>PAINEL ADMINISTRATIVO</h1>
    <p>Maria Paula &amp; Wilson</p>
  </div>
  
  <div class="container">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icone">📸</div>
        <div class="stat-numero" id="statFotos">0</div>
        <div class="stat-label">FOTOS</div>
      </div>
      <div class="stat-card">
        <div class="stat-icone">👥</div>
        <div class="stat-numero" id="statConvidados">0</div>
        <div class="stat-label">CONVIDADOS</div>
      </div>
      <div class="stat-card">
        <div class="stat-icone">💬</div>
        <div class="stat-numero" id="statMensagens">0</div>
        <div class="stat-label">MENSAGENS</div>
      </div>
      <div class="stat-card">
        <div class="stat-icone">⏱️</div>
        <div class="stat-numero" id="statUltima">--</div>
        <div class="stat-label">ÚLTIMA FOTO</div>
      </div>
    </div>
    
    <div class="controles">
      <div class="controles-grupo">
        <button class="btn btn-aviso" id="btnPausa" onclick="togglePausa()">
          <span id="iconePausa">⏸️</span>
          <span id="textoPausa">Pausar Galeria</span>
        </button>
        <span class="status-pausa" id="statusPausa">⏸️ GALERIA PAUSADA</span>
      </div>
      <div class="controles-grupo" style="align-items:center; gap:12px;">
        <span style="font-size:0.85em; font-weight:600; color:#7f8c8d;">🖼️ Modo:</span>
        <select id="seletorModo" onchange="definirModo(this.value)" style="padding:8px 12px; border-radius:8px; border:2px solid #e0e0e0; font-weight:600; font-size:0.9em;">
          <option value="cover">Cortar (cover)</option>
          <option value="contain">Ajustar (contain)</option>
          <option value="blur">Desfocado (blur)</option>
          <option value="fill">Esticar (fill)</option>
        </select>
        <label style="display:flex; align-items:center; gap:6px; cursor:pointer; font-size:0.85em; font-weight:600; color:#7f8c8d;">
          <input type="checkbox" id="chkFullscreen" onchange="definirFullscreen(this.checked)"> Tela cheia ao chegar
        </label>
      </div>
      <div class="controles-grupo">
        <button class="btn btn-sucesso" onclick="exportarRelatorio()">
          💾 Exportar Relatório
        </button>
        <button class="btn btn-primario" onclick="atualizarDados()">
          🔄 Atualizar
        </button>
      </div>
    </div>
    
    <div class="abas">
      <div class="aba ativa" onclick="mudarAba('fotos', this)">📸 Fotos</div>
      <div class="aba" onclick="mudarAba('mensagens', this)">💬 Mensagens</div>
    </div>
    
    <div class="conteudo-aba ativo" id="aba-fotos">
      <div class="fotos-grid" id="fotosGrid"></div>
    </div>
    
    <div class="conteudo-aba" id="aba-mensagens">
      <div class="mensagens-lista" id="mensagensLista"></div>
    </div>
  </div>
  
  <div class="lightbox-overlay" id="lightbox" onclick="fecharLightbox()">
    <img id="lightboxImg" src="" alt="Foto ampliada">
  </div>
  
  <div class="toast" id="toast"></div>
  
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h3>Confirmar exclusão</h3>
      <p>Tem certeza que deseja deletar esta foto? Esta ação não pode ser desfeita.</p>
      <div class="modal-botoes">
        <button class="btn btn-primario" onclick="fecharModal()">Cancelar</button>
        <button class="btn btn-perigo" id="btnConfirmarDelete">Deletar</button>
      </div>
    </div>
  </div>

  <script>
    const URL_API = 'https://script.google.com/macros/s/AKfycbwVGX4sNDlau179tcFH3sGHnh3TBMTPpuBajcd4HMgny7GsODOQTKR43YXikkKn2yBwmg/exec';
    function urlComCacheBust(url) { return url + '?_=' + Date.now(); }
    
    let todasFotos = [];
    let galeriaPausada = false;
    
    async function carregarModo() {
      try {
        const resposta = await fetch(URL_API, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ acao: 'verificar_modo' })
        });
        const resultado = await resposta.json();
        if (resultado.sucesso) {
          document.getElementById('seletorModo').value = resultado.modo;
        }
      } catch (erro) { console.error('Erro modo:', erro); }
    }

    async function definirModo(modo) {
      try {
        await fetch(URL_API, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ acao: 'definir_modo', modo: modo })
        });
        mostrarToast('Modo alterado para: ' + modo, 'sucesso');
      } catch (erro) { mostrarToast('Erro: ' + erro.message, 'erro'); }
    }

    async function carregarFullscreen() {
      try {
        const resposta = await fetch(URL_API, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ acao: 'verificar_fullscreen' })
        });
        const resultado = await resposta.json();
        if (resultado.sucesso) {
          document.getElementById('chkFullscreen').checked = resultado.ativo;
        }
      } catch (erro) { console.error('Erro fullscreen:', erro); }
    }

    async function definirFullscreen(ativo) {
      try {
        await fetch(URL_API, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ acao: 'definir_fullscreen', ativo: ativo })
        });
        mostrarToast(ativo ? 'Tela cheia automática ativada' : 'Tela cheia automática desativada', 'sucesso');
      } catch (erro) { mostrarToast('Erro: ' + erro.message, 'erro'); }
    }

    async function carregarDados() {
      try {
        const resposta = await fetch(urlComCacheBust(URL_API));
        const fotos = await resposta.json();
        
        if (!Array.isArray(fotos)) return;
        
        todasFotos = fotos;
        atualizarEstatisticas(fotos);
        renderizarFotos(fotos);
        renderizarMensagens(fotos);
        
        // Verifica estado de pausa
        await verificarEstadoPausa();
        
      } catch (erro) {
        console.error('Erro:', erro);
        mostrarToast('Erro ao carregar dados', 'erro');
      }
    }
    
    async function verificarEstadoPausa() {
      try {
        const resposta = await fetch(URL_API, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ acao: 'verificar_pausa' })
        });
        
        const resultado = await resposta.json();
        
        if (resultado.sucesso) {
          galeriaPausada = resultado.pausada;
          atualizarInterfacePausa();
        }
      } catch (erro) {
        console.error('Erro ao verificar pausa:', erro);
      }
    }
    
    function atualizarDados() {
      carregarDados();
      mostrarToast('Dados atualizados!', 'sucesso');
    }
    
    function atualizarEstatisticas(fotos) {
      document.getElementById('statFotos').textContent = fotos.length;
      
      const convidadosSet = new Set();
      let totalMensagens = 0;
      
      fotos.forEach(foto => {
        if (foto.descricao) {
          const partes = foto.descricao.split(': ');
          if (partes.length > 1) {
            const nome = partes[0];
            if (nome && nome !== 'Convidado') convidadosSet.add(nome);
            totalMensagens++;
          }
        }
      });
      
      document.getElementById('statConvidados').textContent = convidadosSet.size;
      document.getElementById('statMensagens').textContent = totalMensagens;
      
      if (fotos.length > 0) {
        const ultima = new Date(fotos[0].data);
        const agora = new Date();
        const diffMin = Math.floor((agora - ultima) / 60000);
        
        let tempoTexto;
        if (diffMin < 1) tempoTexto = 'agora';
        else if (diffMin < 60) tempoTexto = diffMin + 'min';
        else if (diffMin < 1440) tempoTexto = Math.floor(diffMin/60) + 'h';
        else tempoTexto = Math.floor(diffMin/1440) + 'd';
        
        document.getElementById('statUltima').textContent = tempoTexto;
      }
    }
    
    function renderizarFotos(fotos) {
      const grid = document.getElementById('fotosGrid');
      
      if (fotos.length === 0) {
        grid.innerHTML = '<p style="text-align:center; color:#7f8c8d; padding:40px;">Nenhuma foto ainda</p>';
        return;
      }
      
      grid.innerHTML = fotos.map(foto => {
        let nome = 'Convidado';
        let mensagem = '';
        
        if (foto.descricao) {
          const partes = foto.descricao.split(': ');
          if (partes.length > 1) {
            nome = partes[0];
            mensagem = partes.slice(1).join(': ');
          } else {
            nome = foto.descricao;
          }
        }
        
        const data = new Date(foto.data).toLocaleString('pt-BR');
        
        return `
          <div class="foto-card">
            <img src="${foto.url}" alt="Foto" onclick="abrirLightbox('${foto.url}')">
            <div class="foto-info">
              <div class="foto-nome">${nome}</div>
              <div class="foto-data">${data}</div>
              ${mensagem ? `<div class="foto-mensagem">"${mensagem}"</div>` : ''}
              <button class="btn-deletar" onclick="confirmarDelete('${foto.id}')">
                🗑️ Deletar Foto
              </button>
            </div>
          </div>
        `;
      }).join('');
    }
    
    function renderizarMensagens(fotos) {
      const lista = document.getElementById('mensagensLista');
      
      const mensagens = fotos
        .filter(f => f.descricao && f.descricao.includes(': '))
        .map(f => {
          const partes = f.descricao.split(': ');
          return {
            nome: partes[0],
            mensagem: partes.slice(1).join(': '),
            data: new Date(f.data)
          };
        })
        .sort((a, b) => b.data - a.data);
      
      if (mensagens.length === 0) {
        lista.innerHTML = '<p style="text-align:center; color:#7f8c8d; padding:40px;">Nenhuma mensagem ainda</p>';
        return;
      }
      
      lista.innerHTML = mensagens.map(m => `
        <div class="mensagem-card">
          <div class="mensagem-header">
            <div class="mensagem-nome">${m.nome}</div>
            <div class="mensagem-data">${m.data.toLocaleString('pt-BR')}</div>
          </div>
          <div class="mensagem-texto">"${m.mensagem}"</div>
        </div>
      `).join('');
    }
    
    let idParaDeletar = null;
    
    function confirmarDelete(id) {
      idParaDeletar = id;
      document.getElementById('modal').classList.add('ativo');
    }
    
    function fecharModal() {
      document.getElementById('modal').classList.remove('ativo');
      idParaDeletar = null;
    }
    
    document.getElementById('btnConfirmarDelete').addEventListener('click', async function() {
      if (!idParaDeletar) return;
      
      try {
        const resposta = await fetch(URL_API, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({
            acao: 'deletar',
            id: idParaDeletar
          })
        });
        
        const resultado = await resposta.json();
        
        if (resultado.sucesso) {
          mostrarToast('Foto deletada com sucesso!', 'sucesso');
          fecharModal();
          setTimeout(carregarDados, 1000);
        } else {
          mostrarToast('Erro ao deletar: ' + resultado.erro, 'erro');
        }
      } catch (erro) {
        mostrarToast('Erro na conexão: ' + erro.message, 'erro');
      }
    });
    
    async function togglePausa() {
      try {
        const novaPausa = !galeriaPausada;
        
        const resposta = await fetch(URL_API, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({
            acao: 'pausar',
            pausar: novaPausa
          })
        });
        
        const resultado = await resposta.json();
        
        if (resultado.sucesso) {
          galeriaPausada = novaPausa;
          atualizarInterfacePausa();
          
          if (galeriaPausada) {
            mostrarToast('Galeria pausada. Novas fotos não aparecerão no telão.', 'sucesso');
          } else {
            mostrarToast('Galeria retomada!', 'sucesso');
          }
        }
      } catch (erro) {
        mostrarToast('Erro: ' + erro.message, 'erro');
      }
    }
    
    function atualizarInterfacePausa() {
      const btn = document.getElementById('btnPausa');
      const icone = document.getElementById('iconePausa');
      const texto = document.getElementById('textoPausa');
      const status = document.getElementById('statusPausa');
      
      if (galeriaPausada) {
        icone.textContent = '▶️';
        texto.textContent = 'Retomar Galeria';
        status.classList.add('ativo');
        btn.classList.remove('btn-aviso');
        btn.classList.add('btn-sucesso');
      } else {
        icone.textContent = '⏸️';
        texto.textContent = 'Pausar Galeria';
        status.classList.remove('ativo');
        btn.classList.remove('btn-sucesso');
        btn.classList.add('btn-aviso');
      }
    }
    
    async function exportarRelatorio() {
      try {
        mostrarToast('Gerando relatório...', 'sucesso');
        
        const resposta = await fetch(URL_API, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ acao: 'exportar' })
        });
        
        const resultado = await resposta.json();
        
        if (resultado.sucesso) {
          mostrarToast('Relatório salvo no Drive!', 'sucesso');
          setTimeout(() => {
            window.open(resultado.url, '_blank');
          }, 1000);
        } else {
          mostrarToast('Erro: ' + resultado.erro, 'erro');
        }
      } catch (erro) {
        mostrarToast('Erro: ' + erro.message, 'erro');
      }
    }
    
    function mudarAba(aba, el) {
      document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
      document.querySelectorAll('.conteudo-aba').forEach(c => c.classList.remove('ativo'));
      
      el.classList.add('ativa');
      document.getElementById('aba-' + aba).classList.add('ativo');
    }
    
    function abrirLightbox(url) {
      document.getElementById('lightboxImg').src = url;
      document.getElementById('lightbox').classList.add('ativo');
    }
    function fecharLightbox() {
      document.getElementById('lightbox').classList.remove('ativo');
    }
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') fecharLightbox();
    });
    
    function mostrarToast(mensagem, tipo) {
      const toast = document.getElementById('toast');
      toast.textContent = mensagem;
      toast.className = 'toast ' + tipo + ' ativo';
      
      setTimeout(() => {
        toast.classList.remove('ativo');
      }, 5000);
    }
    
    carregarDados();
    carregarModo();
    carregarFullscreen();
    setInterval(carregarDados, 15000);
  </script>
</body>
</html>
